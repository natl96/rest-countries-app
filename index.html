<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Dónde en el mundo?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>¿Dónde en el mundo?</h1>
            <button id="theme-toggle" class="theme-btn">
                <span id="theme-icon">🌙</span> Modo Oscuro
            </button>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <input type="text" id="search-input" placeholder="Buscar país..." class="search-input">
            
            <select id="region-filter" class="region-select">
                <option value="">Filtrar por Región</option>
                <option value="Africa">África</option>
                <option value="Americas">América</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europa</option>
                <option value="Oceania">Oceanía</option>
            </select>
        </div>

        <div id="countries-grid" class="countries-grid"></div>

        <div id="detail-view" class="detail-view" style="display: none;">
            <button id="back-btn" class="back-btn">← Volver</button>
            <div class="detail-content" id="detail-content"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
